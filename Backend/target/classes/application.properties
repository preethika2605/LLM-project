server.port=8080

spring.data.mongodb.uri=mongodb://localhost:27017/localai
spring.data.mongodb.database=localai

spring.main.allow-bean-definition-overriding=true

# Configure max upload size for images (10MB)
server.tomcat.max-http-post-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=MyVeryLongSecretKeyForJWTTokenGenerationAndValidation12345
jwt.expiration=86400000